<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threshold Observatory</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --line: #95f2ff;
        --accent: #ffd089;
        --panel: rgba(8, 12, 20, 0.76);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 15% 20%,
            rgba(255, 255, 255, 0.05),
            transparent 20%
          ),
          linear-gradient(155deg, #05070d 0%, var(--bg) 55%, #140d15 100%);
        color: #f4ecdf;
        font-family:
          "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        z-index: 0;
        transform: scale(var(--audio-bloom-glow, 1));
        transition: transform 120ms linear;
      }

      body::before {
        width: 32rem;
        height: 32rem;
        top: -8rem;
        right: -6rem;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 208, 137, 0.08),
          transparent 70%
        );
        filter: blur(12px);
      }

      body::after {
        width: 24rem;
        height: 24rem;
        bottom: -6rem;
        left: -5rem;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(149, 242, 255, 0.08),
          transparent 72%
        );
        filter: blur(10px);
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.12;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size:
          4px 4px,
          6px 6px;
      }

      .layout {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      }

      .panel {
        padding: 1.2rem;
        background: linear-gradient(
          180deg,
          rgba(7, 10, 18, 0.92),
          var(--panel)
        );
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        align-content: start;
        gap: 1rem;
        backdrop-filter: blur(10px);
      }

      .micro,
      button,
      a,
      .legend {
        font-family:
          "IBM Plex Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
      }

      .micro {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--line);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 6vw, 4.6rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        line-height: 1.65;
        color: rgba(244, 236, 223, 0.78);
      }

      .controls,
      .manifest-list {
        display: grid;
        gap: 0.7rem;
      }

      button,
      a {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 0.8rem 1rem;
        color: inherit;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        transition:
          transform 180ms ease,
          background 180ms ease,
          border-color 180ms ease;
      }

      button:hover,
      button:focus-visible,
      a:hover,
      a:focus-visible {
        outline: none;
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.3);
      }

      details.sliders-section {
        display: grid;
        gap: 1.1rem;
        padding: 1.1rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 1.2rem;
        backdrop-filter: blur(8px);
        margin-top: 0.5rem;
      }

      details.sliders-section summary {
        font-family:
          "IBM Plex Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--line);
        cursor: pointer;
        outline: none;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
      }

      details.sliders-section summary::-webkit-details-marker {
        display: none;
      }

      details.sliders-section summary::after {
        content: ":: [+]";
        color: var(--accent);
      }

      details.sliders-section[open] summary::after {
        content: ":: [-]";
      }

      details.sliders-section[open] > *:not(summary) {
        margin-top: 0.5rem;
      }

      .sliders-section select {
        appearance: none;
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 0.6rem 1rem;
        color: inherit;
        font-family:
          "IBM Plex Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        outline: none;
        transition: border-color 150ms ease;
      }

      .sliders-section select:hover,
      .sliders-section select:focus {
        border-color: rgba(255, 255, 255, 0.3);
      }

      .slider-group {
        display: grid;
        gap: 0.4rem;
      }

      .slider-group label {
        font-family:
          "IBM Plex Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(244, 236, 223, 0.74);
        display: flex;
        justify-content: space-between;
      }

      .slider-group label span {
        color: var(--accent);
        font-weight: bold;
      }

      /* Premium styled range input */
      .slider-group input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        outline: none;
        transition: background 200ms ease;
      }

      .slider-group input[type="range"]:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      /* Webkit / Chrome / Safari thumb */
      .slider-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--line);
        border: 2px solid var(--bg);
        cursor: pointer;
        box-shadow: 0 0 10px var(--line);
        transition:
          transform 150ms ease,
          background 150ms ease;
      }

      .slider-group input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        background: var(--accent);
        box-shadow: 0 0 14px var(--accent);
      }

      /* Firefox thumb */
      .slider-group input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--line);
        border: 2px solid var(--bg);
        cursor: pointer;
        box-shadow: 0 0 10px var(--line);
        transition:
          transform 150ms ease,
          background 150ms ease;
      }

      .slider-group input[type="range"]::-moz-range-thumb:hover {
        transform: scale(1.2);
        background: var(--accent);
        box-shadow: 0 0 14px var(--accent);
      }

      #audio-button.is-resonating {
        border-color: var(--accent);
        background: rgba(255, 208, 137, 0.08);
        box-shadow: 0 0 12px rgba(255, 208, 137, 0.15);
      }

      .color-group {
        display: flex;
        gap: 0.8rem;
        justify-content: space-between;
        margin-top: 0.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 0.8rem;
      }

      .color-picker-wrapper {
        display: grid;
        gap: 0.25rem;
        justify-items: center;
        flex: 1;
      }

      .color-picker-wrapper label {
        font-family:
          "IBM Plex Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(244, 236, 223, 0.6);
      }

      .color-picker-wrapper input[type="color"] {
        -webkit-appearance: none;
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        width: 28px;
        height: 28px;
        cursor: pointer;
        background: none;
        padding: 0;
        transition:
          transform 150ms ease,
          border-color 150ms ease;
      }

      .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 50%;
      }

      .color-picker-wrapper input[type="color"]::-moz-color-swatch {
        border: none;
        border-radius: 50%;
      }

      .color-picker-wrapper input[type="color"]:hover {
        transform: scale(1.15);
        border-color: rgba(255, 255, 255, 0.4);
      }

      .manifest-list {
        margin: 0;
      }

      .manifest-list div {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.7rem 0.8rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .manifest-list dt {
        color: rgba(244, 236, 223, 0.58);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.72rem;
      }

      .manifest-list dd {
        margin: 0;
        text-align: right;
      }

      .manifest-list div.clickable-manifest-row {
        cursor: pointer;
        position: relative;
        transition:
          border-color 200ms ease,
          background 200ms ease,
          box-shadow 200ms ease;
      }

      .manifest-list div.clickable-manifest-row:hover,
      .manifest-list div.clickable-manifest-row:focus-visible {
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.15);
        outline: none;
      }

      .manifest-list div.clickable-manifest-row.is-void-active {
        border-color: var(--accent);
        background: rgba(138, 43, 226, 0.15);
        box-shadow: 0 0 12px rgba(138, 43, 226, 0.25);
      }

      .manifest-list div.clickable-manifest-row.is-void-active dd {
        color: var(--accent);
        text-shadow: 0 0 8px var(--accent);
        font-weight: bold;
      }

      body.is-void .frame {
        background:
          radial-gradient(
            circle at 50% 38%,
            rgba(138, 43, 226, 0.12),
            transparent 44%
          ),
          rgba(2, 2, 6, 0.85);
      }

      .viewport {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.1rem;
      }

      .frame {
        width: min(100%, 72rem);
        height: min(90vh, 52rem);
        border-radius: 1.8rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          radial-gradient(
            circle at 50% 38%,
            rgba(255, 255, 255, 0.08),
            transparent 44%
          ),
          rgba(3, 5, 10, 0.55);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        overflow: hidden;
        position: relative;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .legend {
        position: absolute;
        right: 1rem;
        bottom: 1rem;
        max-width: min(32rem, calc(100% - 2rem));
        padding: 0.85rem 1rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 10, 18, 0.78);
        backdrop-filter: blur(10px);
        line-height: 1.6;
        color: rgba(244, 236, 223, 0.82);
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem 0.4rem;
        align-items: center;
        font-size: 0.78rem;
      }

      .legend-seed {
        color: var(--accent);
        font-weight: 600;
      }

      .legend-phase {
        color: var(--line);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .legend-sep {
        color: rgba(244, 236, 223, 0.3);
      }

      .legend-val {
        color: rgba(244, 236, 223, 0.72);
      }

      @keyframes phaseCross {
        0% {
          opacity: 1;
        }
        35% {
          opacity: 0.55;
        }
        100% {
          opacity: 1;
        }
      }

      .is-crossing .frame {
        animation: phaseCross 420ms ease both;
      }

      @media (max-width: 960px) {
        body {
          overflow: auto;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .viewport {
          min-height: auto;
        }

        .frame {
          height: min(72vh, 34rem);
        }
      }
    </style>
    <script src="../thresholds.js" defer></script>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="layout">
      <aside class="panel">
        <div class="micro">Threshold Observatory</div>
        <h1 id="observatory-title">The room, from farther away.</h1>
        <p id="observatory-copy">
          Legacy query parameters still work here, but the sigil now uses the
          same seeded ritual engine as the room itself.
        </p>
        <div class="controls">
          <button id="phase-button" type="button">Advance phase</button>
          <button id="reseed-button" type="button">Reseed</button>
          <button id="manifest-button" type="button">Toggle manifest</button>
          <button id="audio-button" type="button">Resonate (Audio off)</button>
          <a id="room-link" href="../index.html">Return to the room</a>
          <a id="memory-link" href="../forgotten.html"
            >Enter the memory chamber</a
          >
        </div>
        <details class="sliders-section" open>
          <summary>Adjust Geometry</summary>
          <div class="slider-group">
            <label for="select-mode"
              >Render Mode <span id="val-mode">orbital</span></label
            >
            <select id="select-mode">
              <option value="orbital">orbital</option>
              <option value="constellation">constellation</option>
              <option value="spiral">spiral</option>
            </select>
          </div>
          <div class="slider-group">
            <label for="slider-iterations"
              >Iterations <span id="val-iterations">128</span></label
            >
            <input
              type="range"
              id="slider-iterations"
              min="24"
              max="720"
              value="128"
              step="1"
            />
          </div>
          <div class="slider-group">
            <label for="slider-orbit"
              >Orbit Radius <span id="val-orbit">0.50</span></label
            >
            <input
              type="range"
              id="slider-orbit"
              min="0"
              max="1"
              value="0.5"
              step="0.01"
            />
          </div>
          <div class="slider-group">
            <label for="slider-noise"
              >Noise <span id="val-noise">0.50</span></label
            >
            <input
              type="range"
              id="slider-noise"
              min="0"
              max="1"
              value="0.5"
              step="0.01"
            />
          </div>
          <div class="slider-group">
            <label for="slider-speed"
              >Speed <span id="val-speed">1.00</span></label
            >
            <input
              type="range"
              id="slider-speed"
              min="0"
              max="3"
              value="1"
              step="0.05"
            />
          </div>
          <div class="color-group">
            <div class="color-picker-wrapper">
              <label for="color-bg">Background</label>
              <input type="color" id="color-bg" value="#0b1020" />
            </div>
            <div class="color-picker-wrapper">
              <label for="color-line">Line</label>
              <input type="color" id="color-line" value="#95f2ff" />
            </div>
            <div class="color-picker-wrapper">
              <label for="color-accent">Accent</label>
              <input type="color" id="color-accent" value="#ffd089" />
            </div>
          </div>
        </details>
        <dl class="manifest-list" id="manifest-list"></dl>
      </aside>
      <section class="viewport">
        <div class="frame">
          <canvas id="sigil" data-testid="sigil-canvas"></canvas>
          <div class="legend" id="legend"></div>
        </div>
      </section>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const Engine = window.ThresholdsEngine;

        const VISITED_KEY = "threshold-visited-chambers-v1";
        function recordVisit(chamber) {
          try {
            let visited = JSON.parse(localStorage.getItem(VISITED_KEY) || "[]");
            if (!Array.isArray(visited)) visited = [];
            if (!visited.includes(chamber)) {
              visited.push(chamber);
              localStorage.setItem(VISITED_KEY, JSON.stringify(visited));
            }
          } catch (e) {}
        }
        recordVisit("observatory");

        function hasVisitedAll() {
          try {
            const visited = JSON.parse(
              localStorage.getItem(VISITED_KEY) || "[]",
            );
            return (
              Array.isArray(visited) &&
              visited.includes("room") &&
              visited.includes("observatory") &&
              visited.includes("memory")
            );
          } catch (e) {
            return false;
          }
        }

        const search = new URLSearchParams(window.location.search);
        const reduceMotion =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const voidActive =
          search.get("void") === "true" || search.get("mode") === "void";
        const overrides = {
          background: Engine.parseColor(search.get("background"), null),
          line: Engine.parseColor(search.get("line"), null),
          accent: Engine.parseColor(search.get("accent"), null),
          iterations: Engine.parseNumber(search.get("iterations"), undefined, {
            min: 24,
            max: 720,
          }),
          orbitRadius: Engine.parseNumber(
            search.get("orbitRadius"),
            undefined,
            { min: 0, max: 1 },
          ),
          noise: Engine.parseNumber(search.get("noise"), undefined, {
            min: 0,
            max: 1,
          }),
          speed: Engine.parseNumber(search.get("speed"), undefined, {
            min: 0,
            max: 3,
          }),
          mode: ["orbital", "constellation", "spiral", "void"].includes(
            search.get("mode"),
          )
            ? search.get("mode")
            : undefined,
          void: voidActive ? true : undefined,
        };

        Object.keys(overrides).forEach((key) => {
          if (overrides[key] === null || overrides[key] === undefined) {
            delete overrides[key];
          }
        });

        const state = {
          seed:
            Engine.sanitizeSeed(search.get("seed")) || Engine.generateSeed(),
          phase: Engine.parsePhase(search.get("phase")),
          persistSeed: search.has("seed"),
          overrides,
          manifestOpen: true,
          manifestEntries: [],
        };

        const canvas = document.getElementById("sigil");
        const title = document.getElementById("observatory-title");
        const copy = document.getElementById("observatory-copy");
        const legend = document.getElementById("legend");
        const manifestList = document.getElementById("manifest-list");
        const phaseButton = document.getElementById("phase-button");
        const reseedButton = document.getElementById("reseed-button");
        const manifestButton = document.getElementById("manifest-button");
        const audioButton = document.getElementById("audio-button");
        const colorBg = document.getElementById("color-bg");
        const colorLine = document.getElementById("color-line");
        const colorAccent = document.getElementById("color-accent");
        const roomLink = document.getElementById("room-link");
        const memoryLink = document.getElementById("memory-link");
        const audio = Engine.createResonanceCircuit();

        const renderer = Engine.createSigilRenderer({
          canvas,
          seed: state.seed,
          phase: state.phase,
          reducedMotion: reduceMotion,
          overrides: state.overrides,
          audioSource: audio,
        });

        function updateTheme() {
          const palette = Engine.derivePalette(
            state.seed,
            state.phase,
            state.overrides,
          );
          document.body.style.setProperty("--bg", palette.background);
          document.body.style.setProperty("--line", palette.line);
          document.body.style.setProperty("--accent", palette.accent);
          document.body.style.setProperty("--panel", palette.panel);
        }

        function renderManifest() {
          const isTriad = hasVisitedAll() ? "threefold" : "incomplete";
          const rows = state.manifestEntries.concat([
            { key: "seed", value: state.seed },
            { key: "phase", value: state.phase },
            { key: "mode", value: renderer.getState().config.mode },
            { key: "iterations", value: renderer.getState().config.iterations },
            {
              key: "noise",
              value: renderer.getState().config.noise.toFixed(2),
            },
            { key: "corridors", value: isTriad },
          ]);

          manifestList.innerHTML = rows
            .map((row) => {
              if (row.key === "corridors" && hasVisitedAll()) {
                const activeClass = state.overrides.void
                  ? "is-void-active"
                  : "";
                return `<div class="manifest-row clickable-manifest-row ${activeClass}" id="manifest-toggle-void" role="button" tabindex="0" title="Click to toggle Void Resonance"><dt>${row.key}</dt><dd>${row.value}</dd></div>`;
              }
              return `<div><dt>${row.key}</dt><dd>${row.value}</dd></div>`;
            })
            .join("");
        }

        function syncUrl() {
          const next = new URL(window.location.href);
          next.searchParams.set("phase", state.phase);
          if (state.persistSeed) {
            next.searchParams.set("seed", state.seed);
          } else {
            next.searchParams.delete("seed");
          }
          if (state.overrides.void) {
            next.searchParams.set("void", "true");
          } else {
            next.searchParams.delete("void");
          }
          const overrideKeys = [
            "background",
            "line",
            "accent",
            "iterations",
            "orbitRadius",
            "noise",
            "speed",
            "mode",
          ];
          overrideKeys.forEach((key) => {
            const val = state.overrides[key];
            if (val !== null && val !== undefined) {
              next.searchParams.set(key, String(val));
            } else {
              next.searchParams.delete(key);
            }
          });
          window.history.replaceState(
            {},
            "",
            `${next.pathname}${next.search}${next.hash}`,
          );
        }

        function renderCopy() {
          const text = Engine.deriveText(state.seed, state.phase);
          title.textContent = text.title;
          copy.textContent = text.whisper;
          const config = renderer.getState().config;
          const nextPhase = Engine.nextPhase(state.phase);
          phaseButton.textContent = `Advance to ${nextPhase} (P)`;
          reseedButton.textContent = "Reseed (R)";
          manifestButton.textContent = state.manifestOpen
            ? "Hide manifest (M)"
            : "Show manifest (M)";
          legend.innerHTML = [
            `<span class="legend-seed">${state.seed}</span>`,
            `<span class="legend-sep">::</span>`,
            `<span class="legend-phase">${state.phase}</span>`,
            `<span class="legend-sep">/</span>`,
            `<span class="legend-val">${config.mode}</span>`,
            `<span class="legend-sep">/</span>`,
            `<span class="legend-val">${config.iterations} pts</span>`,
            `<span class="legend-sep">/</span>`,
            `<span class="legend-val">orbit ${config.orbitRadius.toFixed(2)}</span>`,
            `<span class="legend-sep">/</span>`,
            `<span class="legend-val">noise ${config.noise.toFixed(2)}</span>`,
            `<span class="legend-sep">/</span>`,
            `<span class="legend-val">speed ${config.speed.toFixed(2)}</span>`,
          ].join(" ");
        }

        function updateNavigation() {
          const params = {
            seed: state.seed,
            phase: state.phase,
          };
          if (state.overrides.void) {
            params.void = "true";
          }
          const query = new URLSearchParams(params).toString();
          roomLink.href = `../index.html?${query}`;
          memoryLink.href = `../forgotten.html?${query}`;
        }

        function syncAudioUI() {
          if (!audioButton) return;
          const active = audio && audio.isActive();
          audioButton.textContent = active
            ? "Resonate (A — on)"
            : "Resonate (A — off)";
          if (active) {
            audioButton.classList.add("is-resonating");
          } else {
            audioButton.classList.remove("is-resonating");
          }
        }

        function applyState() {
          if (state.overrides.void) {
            document.body.classList.add("is-void");
          } else {
            document.body.classList.remove("is-void");
          }
          updateTheme();
          renderer.setState({
            seed: state.seed,
            phase: state.phase,
            reducedMotion: reduceMotion,
            overrides: state.overrides,
          });
          renderCopy();
          renderManifest();
          updateNavigation();
          syncUrl();
          updateSliders();
          manifestList.hidden = !state.manifestOpen;
          syncAudioUI();
          if (audio) {
            if (typeof audio.setVoidMode === "function") {
              audio.setVoidMode(state.overrides.void === true);
            }
            audio.setSeed(state.seed);
          }
          if (audio && audio.isActive()) {
            audio.setPointer(0.5, 0.5, state.phase);
          }
        }

        function updateSliders() {
          const config = renderer.getState().config;
          const modeInput = document.getElementById("select-mode");
          const iterInput = document.getElementById("slider-iterations");
          const orbitInput = document.getElementById("slider-orbit");
          const noiseInput = document.getElementById("slider-noise");
          const speedInput = document.getElementById("slider-speed");

          const modeVal = document.getElementById("val-mode");
          const iterVal = document.getElementById("val-iterations");
          const orbitVal = document.getElementById("val-orbit");
          const noiseVal = document.getElementById("val-noise");
          const speedVal = document.getElementById("val-speed");

          if (modeInput) {
            modeInput.value = config.mode;
            modeVal.textContent = config.mode;
          }
          if (iterInput) {
            iterInput.value = config.iterations;
            iterVal.textContent = config.iterations;
          }
          if (orbitInput) {
            orbitInput.value = config.orbitRadius;
            orbitVal.textContent = config.orbitRadius.toFixed(2);
          }
          if (noiseInput) {
            noiseInput.value = config.noise;
            noiseVal.textContent = config.noise.toFixed(2);
          }
          if (speedInput) {
            speedInput.value = config.speed;
            speedVal.textContent = config.speed.toFixed(2);
          }
          if (colorBg) colorBg.value = config.palette.background;
          if (colorLine) colorLine.value = config.palette.line;
          if (colorAccent) colorAccent.value = config.palette.accent;
        }

        function setupSliderListeners() {
          const modeInput = document.getElementById("select-mode");
          const iterInput = document.getElementById("slider-iterations");
          const orbitInput = document.getElementById("slider-orbit");
          const noiseInput = document.getElementById("slider-noise");
          const speedInput = document.getElementById("slider-speed");

          const updateOverride = (key, val) => {
            state.overrides[key] = val;
            if (key === "mode") {
              if (val === "void") {
                state.overrides.void = true;
              } else if (state.overrides.void) {
                delete state.overrides.void;
              }
            }
            if (state.overrides.void) {
              document.body.classList.add("is-void");
            } else {
              document.body.classList.remove("is-void");
            }
            updateTheme();

            renderer.setState({
              seed: state.seed,
              phase: state.phase,
              reducedMotion: reduceMotion,
              overrides: state.overrides,
            });
            renderCopy();
            renderManifest();
            updateNavigation();
            syncUrl();

            const displayId = {
              mode: "val-mode",
              iterations: "val-iterations",
              orbitRadius: "val-orbit",
              noise: "val-noise",
              speed: "val-speed",
            }[key];
            const displayEl = document.getElementById(displayId);
            if (displayEl) {
              displayEl.textContent =
                typeof val === "number" && key !== "iterations"
                  ? val.toFixed(2)
                  : val;
            }
          };

          if (modeInput) {
            modeInput.addEventListener("change", (e) => {
              updateOverride("mode", e.target.value);
            });
          }
          iterInput.addEventListener("input", (e) => {
            updateOverride("iterations", parseInt(e.target.value, 10));
          });
          orbitInput.addEventListener("input", (e) => {
            updateOverride("orbitRadius", parseFloat(e.target.value));
          });
          noiseInput.addEventListener("input", (e) => {
            updateOverride("noise", parseFloat(e.target.value));
          });
          speedInput.addEventListener("input", (e) => {
            updateOverride("speed", parseFloat(e.target.value));
          });
          colorBg.addEventListener("input", (e) => {
            updateOverride("background", e.target.value);
            updateTheme();
          });
          colorLine.addEventListener("input", (e) => {
            updateOverride("line", e.target.value);
            updateTheme();
          });
          colorAccent.addEventListener("input", (e) => {
            updateOverride("accent", e.target.value);
            updateTheme();
          });
        }

        async function loadManifest() {
          try {
            const response = await fetch("../threshold.yaml");
            const text = await response.text();
            state.manifestEntries = Engine.parseManifest(text);
          } catch (error) {
            state.manifestEntries = [
              { key: "manifest", value: "unheard" },
              { key: "loop", value: "half-open" },
            ];
          }
          renderManifest();
        }

        function cyclePhase() {
          document.body.classList.add("is-crossing");
          state.phase = Engine.nextPhase(state.phase);
          applyState();
          window.setTimeout(
            () => document.body.classList.remove("is-crossing"),
            450,
          );
        }

        phaseButton.addEventListener("click", cyclePhase);
        reseedButton.addEventListener("click", () => {
          state.seed = Engine.generateSeed();
          applyState();
        });
        manifestButton.addEventListener("click", () => {
          state.manifestOpen = !state.manifestOpen;
          manifestList.hidden = !state.manifestOpen;
          manifestButton.textContent = state.manifestOpen
            ? "Hide manifest (M)"
            : "Show manifest (M)";
        });

        canvas.addEventListener("click", cyclePhase);
        canvas.addEventListener("pointermove", (event) => {
          const rect = canvas.getBoundingClientRect();
          const px = (event.clientX - rect.left) / rect.width;
          const py = (event.clientY - rect.top) / rect.height;
          renderer.setPointer({
            x: px,
            y: py,
            active: true,
          });
          if (audio && audio.isActive()) {
            audio.setPointer(px, py, state.phase);
          }
        });
        canvas.addEventListener("pointerleave", () => {
          renderer.clearPointer();
          if (audio && audio.isActive()) {
            audio.setPointer(0.5, 0.5, state.phase);
          }
        });
        audioButton.addEventListener("click", () => {
          const active = audio.isActive();
          audio.toggle(!active);
          if (!active) {
            audio.setSeed(state.seed);
            audio.setPointer(0.5, 0.5, state.phase);
          }
          syncAudioUI();
        });

        window.addEventListener("keydown", (event) => {
          if (
            event.defaultPrevented ||
            event.metaKey ||
            event.ctrlKey ||
            event.altKey
          )
            return;
          const key =
            typeof event.key === "string" ? event.key.toLowerCase() : "";
          if (key === "r") {
            event.preventDefault();
            state.seed = Engine.generateSeed();
            applyState();
          }
          if (key === "a") {
            event.preventDefault();
            const active = audio.isActive();
            audio.toggle(!active);
            if (!active) {
              audio.setSeed(state.seed);
              audio.setPointer(0.5, 0.5, state.phase);
            }
            syncAudioUI();
          }
          if (key === "p") {
            event.preventDefault();
            cyclePhase();
          }
          if (key === "m") {
            event.preventDefault();
            state.manifestOpen = !state.manifestOpen;
            manifestList.hidden = !state.manifestOpen;
            manifestButton.textContent = state.manifestOpen
              ? "Hide manifest (M)"
              : "Show manifest (M)";
          }
        });

        function updateAudioGlow() {
          if (audio && audio.isActive()) {
            const metrics = audio.getMetrics();
            const pulse = 1.0 + metrics.lfoPhase * 0.12;
            const envelope = 1.0 + (metrics.filterEnvelope - 0.5) * 0.08;
            document.body.style.setProperty(
              "--audio-bloom-glow",
              `${pulse * envelope}`,
            );
          } else {
            document.body.style.setProperty("--audio-bloom-glow", "1.0");
          }
          requestAnimationFrame(updateAudioGlow);
        }
        requestAnimationFrame(updateAudioGlow);

        const slidersSection = document.querySelector(".sliders-section");
        if (slidersSection) {
          slidersSection.open = window.innerWidth > 960;
        }

        if (hasVisitedAll()) {
          const selectModeEl = document.getElementById("select-mode");
          if (selectModeEl) {
            const opt = document.createElement("option");
            opt.value = "void";
            opt.textContent = "void (unlocked)";
            selectModeEl.appendChild(opt);
          }
        }

        function toggleVoidResonance() {
          if (state.overrides.void) {
            delete state.overrides.void;
            if (state.overrides.mode === "void") {
              state.overrides.mode = "orbital";
            }
          } else {
            state.overrides.void = true;
            state.overrides.mode = "void";
          }
          applyState();
        }

        manifestList.addEventListener("click", (event) => {
          const toggle = event.target.closest("#manifest-toggle-void");
          if (toggle) {
            toggleVoidResonance();
          }
        });

        manifestList.addEventListener("keydown", (event) => {
          const toggle = event.target.closest("#manifest-toggle-void");
          if (toggle && (event.key === "Enter" || event.key === " ")) {
            event.preventDefault();
            toggleVoidResonance();
          }
        });

        setupSliderListeners();
        applyState();
        loadManifest();
      });
    </script>
  </body>
</html>
